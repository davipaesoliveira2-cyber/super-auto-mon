services:
  - type: web
    name: super-auto-mon-api
    runtime: node
    repo: https://github.com/davipaesoliveira2-cyber/super-auto-mon
    branch: master
    rootDir: backend
    buildCommand: npm ci && npm run build
    startCommand: node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        sync: false
    healthCheckPath: /health

  - type: web
    name: super-auto-mon-frontend
    runtime: static
    repo: https://github.com/davipaesoliveira2-cyber/super-auto-mon
    branch: master
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_BACKEND_URL
        sync: false
